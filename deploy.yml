name: CD — Terraform + Deploy to EC2

on:
  workflow_run:
    workflows: ["CI — Build, Test & Analyze"]
    types: [completed]
    branches: [main]

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    defaults:
      run:
        working-directory: infrastructure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_key_name: ${{ secrets.EC2_KEY_NAME }}

      - name: Terraform Apply
        run: terraform apply tfplan

  deploy:
    name: Deploy WAR to EC2
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: dptweb-war
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy WAR via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.BASTION_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "*.war"
          target: "/tmp/"

      - name: Restart Tomcat
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.BASTION_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo cp /tmp/*.war /opt/tomcat/webapps/ROOT.war
            sudo systemctl restart tomcat
            echo "Deployment complete!"
